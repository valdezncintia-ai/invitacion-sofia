<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Invitación Sofía</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      color: #333;
      scroll-behavior: smooth;
    }

    /* Cada página ocupa el alto completo */
    section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem 1.5rem;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Fondos de cada página */
    #pagina1 { background-image: url("IMAGEN_sofia_1.png"); }
    #pagina2 { background-image: url("IMAGEN_sofia_2.png"); }
    #pagina3 { background-image: url("IMAGEN_sofia_3.png"); }
    #pagina4 { background-image: url("IMAGEN_sofia_4.png"); }
    #pagina5 { background-image: url("IMAGEN_sofia_5.png"); }
    #pagina6 { background-image: url("IMAGEN_sofia_6.png"); }

    /* Capa blanca para el formulario */
    .overlay {
      background: rgba(255, 255, 255, 0.92);
      padding: 1.5rem;
      border-radius: 10px;
      max-width: 600px;
      width: 100%;
    }

    h1, h2 { margin-bottom: 1rem; }
    p { margin-bottom: 0.8rem; }

    form { margin-top: 1rem; text-align: left; }

    label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: bold;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 0.6rem;
      margin-bottom: 1rem;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .options label {
      font-weight: normal;
      display: block;
      margin-bottom: 0.3rem;
    }

    .submit-btn {
      width: 100%;
      padding: 0.8rem;
      border: none;
      border-radius: 8px;
      background-color: #ff66aa;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    .submit-btn:hover {
      background-color: #ff4c98;
    }

    /* Navegación superior */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 0.5rem 1rem;
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(4px);
      z-index: 10;
      font-size: 0.9rem;
    }

    nav a {
      text-decoration: none;
      color: #333;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
    }

    nav a:hover {
      background-color: #ffebf5;
    }

    .spacer { height: 40px; }
  </style>
</head>

<body>

  <!-- Navegación -->
  <nav>
    <a href="#pagina1">Principal</a>
    <a href="#pagina2">Página 2</a>
    <a href="#pagina3">Página 3</a>
    <a href="#pagina4">Página 4</a>
    <a href="#pagina5">Página 5</a>
    <a href="#pagina6">Confirmar</a>
  </nav>

  <div class="spacer"></div>

  <!-- PÁGINA 1 -->
  <section id="pagina1">
    <h1></h1>
    <p></p>
    <p></p>
  </section>

  <!-- PÁGINA 2 -->
  <section id="pagina2">
    <h2></h2>
    <p></p>
  </section>

  <!-- PÁGINA 3 -->
  <section id="pagina3">
    <h2></h2>
    <p></p>
  </section>

  <!-- PÁGINA 4 -->
  <section id="pagina4">
    <h2></h2>
    <p></p>
    <p></p>
  </section>

  <!-- PÁGINA 5 -->
  <section id="pagina5">
    <h2></h2>
    <p></p>
  </section>

    <!-- PÁGINA 6 - FORMULARIO -->
  <section id="pagina6">
    <div class="overlay">
      <h2>Confirmar asistencia</h2>
      <p>Completá el formulario para enviarnos tu respuesta.</p>
      
      <!-- Formulario que envía un correo a Cintia -->
      <form action="mailto:cintia_valdez@hotmail.es" method="post" enctype="text/plain">
        <label for="nombre">Nombre del invitado</label>
        <input type="text" id="nombre" name="Nombre" required />

        <label>¿Asistirá a la fiesta?</label>
        <div class="options">
          <label>
            <input type="radio" name="Asistencia" value="Sí, asistiré" required />
            Sí, asistiré
          </label>
          <label>
            <input type="radio" name="Asistencia" value="No podré asistir" />
            No podré asistir
          </label>
        </div>

        <h3>Lista de verificación de alergias</h3>

        <div class="options">
          <label>
            <input type="checkbox" name="Alergia_Sin_TACC" value="Sin TACC" />
            Sin TACC
          </label>
          <label>
            <input type="checkbox" name="Alergia_Otras" value="Otras" />
            Otros (especificar abajo)
          </label>
        </div>

        <label for="comentarios">Comentarios / Detalle de alergias u otra información</label>
        <textarea id="comentarios" name="Comentarios"></textarea>

        <button type="submit" class="submit-btn">Enviar respuesta</button>
      </form>
    </section>

  </div>
</body>
</html>
