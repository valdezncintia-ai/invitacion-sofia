<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Invitación Sofía</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script>
    (function() {
      emailjs.init("ieqez7gphdh7Cm6Tc");
    })();
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      color: #333;
      scroll-behavior: smooth;
    }

    /* Secciones generales */
    section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem 1.5rem;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Fondos */
    #pagina1 { background-image: url("IMAGEN_sofia_1.png"); }
    #pagina2 { background-image: url("IMAGEN_sofia_2.png"); }
    #pagina3 { background-image: url("IMAGEN_sofia_3.png"); }
    #pagina4 { background-image: url("IMAGEN_sofia_4.png"); }
    #pagina5 { background-image: url("IMAGEN_sofia_5.png"); }
    #pagina6 { background-image: url("IMAGEN_sofia_6.png"); }

    /* Caja del formulario */
    .overlay {
      background: rgba(255, 255, 255, 0.92);
      padding: 1.5rem;
      border-radius: 10px;
      max-width: 600px;
      width: 100%;
    }

    h1, h2 { margin-bottom: 1rem; }
    p { margin-bottom: 0.8rem; }

    form { margin-top: 1rem; text-align: left; }

    label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: bold;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 0.6rem;
      margin-bottom: 1rem;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .options label {
      font-weight: normal;
      display: block;
      margin-bottom: 0.3rem;
    }

    .submit-btn {
      width: 100%;
      padding: 0.8rem;
      border: none;
      border-radius: 8px;
      background-color: #ff66aa;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    .submit-btn:hover {
      background-color: #ff4c98;
    }

    /* Navegación */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 0.5rem 1rem;
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(4px);
      z-index: 10;
      font-size: 0.9rem;
    }

    nav a {
      text-decoration: none;
      color: #333;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
    }

    nav a:hover {
      background-color: #ffebf5;
    }

    .spacer { height: 40px; }

    /* ⭐⭐⭐ CORRECCIÓN REAL PARA CELULAR ⭐⭐⭐ */
    @media (max-width: 768px) {

      /* Las secciones dejan de ocupar toda la pantalla */
      section {
        min-height: auto;
        padding: 3rem 1rem;
        background-size: contain;
        background-position: top center;
        background-color: #ffffff;
      }

      /* El formulario se vuelve más cómodo */
      .overlay {
        max-width: 95%;
        padding: 1rem;
      }

      /* Inputs más proporcionados */
      input[type="text"],
      input[type="email"],
      textarea {
        font-size: 0.9rem;
        padding: 0.5rem;
      }

      /* Botón más cómodo */
      .submit-btn {
        padding: 0.7rem;
        font-size: 0.9rem;
      }

      /* Navegación más chica */
      nav {
        flex-wrap: wrap;
        font-size: 0.75rem;
        gap: 0.2rem;
        padding: 0.3rem;
      }
    }

    /* ⭐⭐⭐ CELULARES MUY CHICOS ⭐⭐⭐ */
    @media (max-width: 480px) {

      section {
        padding: 2.5rem 0.8rem;
      }

      .overlay {
        padding: 0.8rem;
      }

      h2 {
        font-size: 1.2rem;
      }

      input, textarea {
        font-size: 0.85rem;
      }
    }
  </style>
</head>

<body>

  <!-- Navegación -->
  <nav>
    <a href="#pagina1">Principal</a>
    <a href="#pagina2">Página 2</a>
    <a href="#pagina3">Página 3</a>
    <a href="#pagina4">Página 4</a>
    <a href="#pagina5">Página 5</a>
    <a href="#pagina6">Confirmar</a>
  </nav>

  <div class="spacer"></div>

  <!-- Páginas -->
  <section id="pagina1"></section>
  <section id="pagina2"></section>
  <section id="pagina3"></section>
  <section id="pagina4"></section>
  <section id="pagina5"></section>

  <!-- PÁGINA 6 - FORMULARIO -->
  <section id="pagina6">
    <div class="overlay">
      <h2>Confirmar asistencia</h2>
      <p>Completá el formulario para enviarnos tu respuesta.</p>

      <form id="formulario">
        <label for="nombre">Nombre del invitado</label>
        <input type="text" id="nombre" name="nombre" required />

        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" required />

        <label>¿Asistirá a la fiesta?</label>
        <div class="options">
          <label><input type="radio" name="asistencia" value="Sí, asistiré" required /> Sí, asistiré</label>
          <label><input type="radio" name="asistencia" value="No podré asistir" /> No podré asistir</label>
        </div>

        <h3>Lista de verificación de alergias</h3>

        <div class="options">
          <label><input type="checkbox" name="sin_tacc" value="Sin TACC" /> Sin TACC</label>
          <label><input type="checkbox" name="otras" value="Otras" /> Otros (especificar abajo)</label>
        </div>

        <label for="comentarios">Comentarios / Detalle de alergias u otra información</label>
        <textarea id="comentarios" name="comentarios"></textarea>

        <button type="submit" class="submit-btn">Enviar respuesta</button>
      </form>
    </div>
  </section>

  <!-- Envío automático con EmailJS -->
  <script>
    document.getElementById("formulario").addEventListener("submit", function(event) {
      event.preventDefault();

      emailjs.sendForm("service_falst2r", "template_2jh9f1n", this)
        .then(() => {
          alert("¡Gracias! Tu confirmación fue enviada correctamente.");
          this.reset();
        }, (error) => {
          alert("Hubo un error al enviar. Intentá nuevamente.");
          console.log(error);
        });
    });
  </script>

</body>
</html>
